# Verifies the generated Python SDK installs and that auto-generated test
# stubs collect cleanly across supported Python versions.

name: Python package

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    defaults:
      run:
        working-directory: python

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: python/requirements.txt

      - name: Install SDK and test deps
        run: |
          python -m pip install --upgrade pip
          pip install .
          pip install pytest flake8

      - name: Lint with flake8 (syntax errors only)
        # Fail only on syntax errors / undefined names; generator output is not
        # formatted to PEP 8 and we don't want to lint upstream-generated code.
        run: flake8 cs2cap --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Test with pytest
        run: pytest
